aplicacao.nome=Sistema de vendas (properties)

#Porta do tomcat
server.port=8080
#define o prefixo da url (http://localhost:8080/vendas/???) antes dos mapeamentos dos controllers
#server.servlet.contextPath=/vendas

# Desabilita o InternalResourceViewResolver padrão em prol do
# thymleaf, para evitar conflitos de resolução de views
spring.mvc.view.ignore-default-model-on-redirect=true
spring.mvc.ignore-default-model-on-redirect=false

#Configurações do Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
# só para desenvolvimento, desabilita o cache para que as
# mudanças nos templates sejam refletidas imediatamente
spring.thymeleaf.cache=false

#controla se o stack trace (a lista detalhada de chamadas de métodos que levou ao erro) será incluído na resposta de erro enviada ao cliente.
#Opções: always, on_trace_param, never
server.error.include-stacktrace=never

#Configuracao de acesso postgres
postgres.datasource.url=jdbc:postgresql://localhost:5432/bootexpert
postgres.datasource.username=expert
postgres.datasource.password=expert
postgres.datasource.driverclassname=org.postgresql.Driver
postgres.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Configurações HikariCP
spring.datasource.hikari.pool-name=MeuPoolHikari
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

#definir usuário/senha fixa
spring.security.user.name=admin
spring.security.user.password=123

# Mostrar/ocultar detalhes
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=false

# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.exclude=logs/**

# Log geral em DEBUG
logging.level.root=DEBUG
# Apenas HikariCP em INFO
logging.level.com.zaxxer.hikari=INFO
# Apenas JPA em DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
# Apenas SQL gerado pelo Hibernate
logging.level.org.hibernate.SQL=DEBUG
# Apenas parâmetros das queries
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=DEBUG
